<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#3730a3"/>
      <stop offset="40%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#e0e7ff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#818cf8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background — deep indigo to black -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Outer swirl arms — large arcs in different indigo/violet shades -->
  <path d="M 16 4 Q 28 4 28 16 Q 28 26 18 27" 
    fill="none" stroke="#6366f1" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
  <path d="M 16 28 Q 4 28 4 16 Q 4 6 14 5" 
    fill="none" stroke="#818cf8" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>

  <!-- Mid swirl arms -->
  <path d="M 16 7 Q 25 7 25 16 Q 25 23 18 24" 
    fill="none" stroke="#a5b4fc" stroke-width="1.4" stroke-linecap="round" opacity="0.65" filter="url(#glow)"/>
  <path d="M 16 25 Q 7 25 7 16 Q 7 9 14 8" 
    fill="none" stroke="#c4b5fd" stroke-width="1.4" stroke-linecap="round" opacity="0.65" filter="url(#glow)"/>

  <!-- Inner tight swirl -->
  <path d="M 16 10 Q 22 10 22 16 Q 22 21 17 21.5" 
    fill="none" stroke="#e0e7ff" stroke-width="1.1" stroke-linecap="round" opacity="0.8" filter="url(#glow)"/>
  <path d="M 16 22 Q 10 22 10 16 Q 10 11 15 10.5" 
    fill="none" stroke="#f0f9ff" stroke-width="1.1" stroke-linecap="round" opacity="0.8" filter="url(#glow)"/>

  <!-- Glowing core -->
  <circle cx="16" cy="16" r="4" fill="url(#core)" filter="url(#softglow)"/>
  <circle cx="16" cy="16" r="2" fill="#e0e7ff" opacity="0.95" filter="url(#glow)"/>
</svg>
